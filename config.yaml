# 园区白领薪资数据分析工具配置文件

# 应用设置
app_title: "园区白领薪资数据分析工具"
window_size: [1400, 800]

# 图表设置
figure_size: [10, 6]
dpi: 100

# 图表颜色
chart_colors:
  - "#3498db"
  - "#e74c3c"
  - "#2ecc71"
  - "#f39c12"
  - "#9b59b6"
  - "#1abc9c"
  - "#e67e22"
  - "#34495e"

# 字段映射（中文到英文）
field_mapping:
  姓名: name
  性别: gender
  年龄: age
  学历: education
  工作年限: work_years
  所在行业: industry
  岗位类型: position_type
  职级: level
  基本工资: base_salary
  绩效奖金: performance_bonus
  补贴总和: allowance
  税前薪资: pre_tax_salary
  税后薪资: post_tax_salary
  所属企业规模: company_size
  入职年份: join_year

# 薪资分组设置
salary_bins:
  - 0
  - 5000
  - 10000
  - 15000
  - 20000
  - 30000
  - 50000
  - .inf

salary_labels:
  - "5千以下"
  - "5千-1万"
  - "1万-1.5万"
  - "1.5万-2万"
  - "2万-3万"
  - "3万-5万"
  - "5万以上"

# 年龄分组设置
age_bins:
  - 0
  - 25
  - 30
  - 35
  - 40
  - 50
  - 60
  - 100

age_labels:
  - "25岁以下"
  - "25-30岁"
  - "30-35岁"
  - "35-40岁"
  - "40-50岁"
  - "50-60岁"
  - "60岁以上"

# 工作年限分组设置
experience_bins:
  - 0
  - 1
  - 3
  - 5
  - 10
  - 15
  - 20
  - .inf

experience_labels:
  - "1年以下"
  - "1-3年"
  - "3-5年"
  - "5-10年"
  - "10-15年"
  - "15-20年"
  - "20年以上"
