# 应用配置文件
app:
  name: "园区白领薪资数据分析工具"
  version: "2.0.0"
  author: "System"
  debug: false

# 数据加载配置
data_loader:
  supported_extensions: [".xlsx", ".xls", ".csv"]
  excel_engine: "openpyxl"
  csv_encoding: "utf-8"
  chunk_size: 10000
  max_file_size: 104857600  # 100MB

# 数据处理配置
data_processing:
  duplicate_subset: null  # null表示使用所有列检测重复
  missing_value_strategy: "drop"  # drop, fill_mean, fill_median, fill_mode
  outlier_zscore_threshold: 3.0
  outlier_iqr_threshold: 1.5
  outlier_method: "iqr"  # zscore, iqr

# 列名映射配置
column_mapping:
  name: ["姓名", "name", "Name", "员工姓名"]
  gender: ["性别", "gender", "Gender", "sex", "Sex"]
  age: ["年龄", "age", "Age", "出生年份", "birth_year"]
  department: ["部门", "department", "Department", "所属部门", "事业部"]
  position: ["职位", "position", "Position", "岗位", "职级"]
  work_years: ["工作年限", "work_years", "WorkYears", "工龄", "司龄"]
  join_year: ["入职年份", "join_year", "JoinYear", "入职时间", "入职日期"]
  education: ["学历", "education", "Education", "最高学历", "文化程度"]
  salary: ["薪资", "salary", "Salary", "工资", "月薪"]
  base_salary: ["基本工资", "base_salary", "底薪"]
  bonus: ["奖金", "bonus", "Bonus", "绩效奖金"]
  pre_tax_salary: ["税前薪资", "pre_tax_salary", "税前工资", "税前收入"]
  after_tax_salary: ["税后薪资", "after_tax_salary", "税后工资", "税后收入"]

# 数据分析配置
analysis:
  categorical_columns: ["gender", "department", "position", "education", "age_group", "salary_group", "experience_group"]
  numeric_columns: ["age", "work_years", "salary", "base_salary", "bonus", "pre_tax_salary", "after_tax_salary"]
  salary_columns: ["salary", "pre_tax_salary", "after_tax_salary", "base_salary"]

# 可视化配置
visualization:
  figure_size: [12, 8]
  dpi: 100
  style: "seaborn-v0_8"
  font_family: "SimHei"
  font_size: 12
  title_font_size: 16
  label_font_size: 12
  tick_font_size: 10
  legend_font_size: 10
  colors:
    primary: "#3498db"
    secondary: "#2ecc71"
    tertiary: "#e74c3c"
    quaternary: "#f39c12"
    quinary: "#9b59b6"
    senary: "#1abc9c"
    septenary: "#34495e"
    octonary: "#95a5a6"
  colormap: "viridis"
  show_grid: true
  show_legend: true
  rotation_xlabel: 45
  bar_width: 0.6
  pie_autopct: "%1.1f%%"
  boxplot_showfliers: true

# 分组配置
grouping:
  age_groups:
    - [0, 25, "25岁及以下"]
    - [25, 30, "26-30岁"]
    - [30, 35, "31-35岁"]
    - [35, 40, "36-40岁"]
    - [40, 45, "41-45岁"]
    - [45, 100, "46岁及以上"]
  salary_groups:
    - [0, 8000, "8k以下"]
    - [8000, 12000, "8k-12k"]
    - [12000, 20000, "12k-20k"]
    - [20000, 30000, "20k-30k"]
    - [30000, 50000, "30k-50k"]
    - [50000, 1000000, "50k以上"]
  experience_groups:
    - [0, 1, "1年以下"]
    - [1, 3, "1-3年"]
    - [3, 5, "3-5年"]
    - [5, 10, "5-10年"]
    - [10, 20, "10-20年"]
    - [20, 100, "20年以上"]

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_to_file: false
  log_file: "app.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  console_output: true

# UI配置
ui:
  window_size: "1400x800"
  min_window_size: [1024, 768]
  title: "园区白领薪资数据分析工具 v2.0.0"
  theme: "clam"  # clam, alt, default, classic
  show_status_bar: true
  show_menu_bar: true
  show_toolbar: false
